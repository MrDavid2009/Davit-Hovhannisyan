      @keyframes pwa-spin {

      }
      @keyframes pwa-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.93; }
      }

    <!-- Service Worker registration script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('ServiceWorker registered with scope: ', reg.scope);
              // Check for updates periodically
              reg.addEventListener('updatefound', () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.addEventListener('statechange', () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // iOS Safari fix: reload AT MOST once per session to avoid an
                      // infinite reload loop that leaves the app stuck on the splash screen.
                      if (!sessionStorage.getItem('sw-reloaded')) {
                        sessionStorage.setItem('sw-reloaded', '1');
                        console.log('New content available; reloading once...');
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch(err => console.error('ServiceWorker registration failed: ', err));
        });
      }
    </script>
